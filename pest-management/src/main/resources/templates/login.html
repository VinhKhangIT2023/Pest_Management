<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống - Pest AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1586771107445-d3afef11d069?q=80&w=2000&auto=format&fit=crop') center/cover fixed; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 400px; transition: transform 0.3s ease; }
        .form-control { background: #f0f2f5; border: none; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.3); background: #fff;}
        .btn-success { background: #27ae60; border: none; transition: all 0.3s; }
        .btn-success:hover { background: #2ecc71; transform: scale(1.02); }
    </style>
</head>
<body>
<div class="login-glass text-center">
    <div class="bg-success rounded-circle d-inline-flex align-items-center justify-content-center text-white mb-3 shadow" style="width: 70px; height: 70px;"><i class="fa-solid fa-leaf fa-2x"></i></div>
    <h3 class="fw-bold text-success">CHÀO MỪNG BẠN</h3>
    <p class="text-muted small mb-4">Đăng nhập để sử dụng đầy đủ tiện ích</p>

    <!-- XỬ LÝ LỖI ĐĂNG NHẬP / BỊ KHÓA -->
    <div th:if="${param.error}" class="alert alert-danger rounded-pill py-2 small fw-bold shadow-sm">
        <span th:if="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null and session['SPRING_SECURITY_LAST_EXCEPTION'].message == 'Tài khoản đã bị khóa'}">
            <i class="fa-solid fa-lock me-1"></i> Tài khoản của bạn đã bị khóa bởi Quản trị viên!
        </span>
        <span th:unless="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null and session['SPRING_SECURITY_LAST_EXCEPTION'].message == 'Tài khoản đã bị khóa'}">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> Sai tài khoản hoặc mật khẩu!
        </span>
    </div>
    <div th:if="${param.registered}" class="alert alert-success rounded-pill py-2 small fw-bold"><i class="fa-solid fa-check me-1"></i> Đăng ký thành công! Hãy đăng nhập.</div>

    <form th:action="@{/login}" method="post">
        <input type="text" class="form-control" name="username" placeholder="Tên đăng nhập" required autofocus>
        <input type="password" class="form-control" name="password" placeholder="Mật khẩu" required>
        <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold shadow-sm fs-5 mb-3">ĐĂNG NHẬP</button>
    </form>
    <a href="/register" class="text-success text-decoration-none fw-bold small">Chưa có tài khoản? Đăng ký ngay</a>
</div>
</body>
</html>

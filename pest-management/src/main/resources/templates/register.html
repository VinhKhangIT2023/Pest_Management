<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - Pest AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1586771107445-d3afef11d069?q=80&w=2000&auto=format&fit=crop') center/cover fixed; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-glass { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 450px; transition: transform 0.3s ease; }
        .login-glass:hover { transform: translateY(-5px); }
        .form-control { background: #f0f2f5; border: none; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.3); }
        .btn-success { background: #27ae60; border: none; transition: all 0.3s; }
        .btn-success:hover { background: #2ecc71; transform: scale(1.02); }
    </style>
</head>
<body>
<div class="login-glass text-center">
    <h3 class="fw-bold text-success mb-4"><i class="fa-solid fa-user-plus me-2"></i>TẠO TÀI KHOẢN</h3>
    <div th:if="${error}" class="alert alert-danger rounded-pill py-2 small fw-bold" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <input type="text" class="form-control" name="fullName" placeholder="Họ và tên" required autofocus>
        <input type="text" class="form-control" name="username" placeholder="Tên đăng nhập" required>
        <input type="password" class="form-control" name="password" placeholder="Mật khẩu" required>
        <input type="password" class="form-control" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
        <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold fs-5 mb-3">ĐĂNG KÝ</button>
    </form>
    <a href="/login" class="text-secondary text-decoration-none fw-bold small"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại Đăng nhập</a>
</div>
</body>
</html>

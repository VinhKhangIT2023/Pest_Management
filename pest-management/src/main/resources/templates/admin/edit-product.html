<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Sản Phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f6f9; }</style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg p-5 rounded-4 border-0 border-top border-5 border-success" style="width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-success mb-0"><i class="fa-solid fa-pen-to-square me-2"></i>Cập nhật thông tin</h4>
            <a href="/admin/products" class="btn btn-outline-secondary btn-sm rounded-pill px-3"><i class="fa-solid fa-arrow-left me-1"></i>Trở về</a>
        </div>

        <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data" th:object="${product}">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="fw-bold text-secondary small mb-1">Tên thuốc:</label>
                <input type="text" th:field="*{name}" class="form-control bg-light border-0 py-2 shadow-none" required>
            </div>

            <div class="mb-3">
                <label class="fw-bold text-secondary small mb-1">Giá bán (VNĐ):</label>
                <input type="number" th:field="*{price}" class="form-control bg-light border-0 py-2 shadow-none" required>
            </div>

            <div class="mb-3">
                <label class="fw-bold text-secondary small mb-1">Mô tả chi tiết:</label>
                <textarea th:field="*{description}" class="form-control bg-light border-0 py-2 shadow-none" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="fw-bold text-secondary small mb-1">Đặc trị bệnh:</label>
                <select th:field="*{insect.id}" class="form-select bg-light border-0 py-2 shadow-none">
                    <option th:each="i : ${insects}" th:value="${i.id}" th:text="${i.displayName}"></option>
                </select>
            </div>

            <div class="mb-4 p-3 bg-light rounded-3 border">
                <label class="fw-bold text-secondary small mb-2"><i class="fa-solid fa-image me-1"></i>Cập nhật ảnh (Từ máy):</label>
                <input type="file" name="imageFile" class="form-control bg-white shadow-none" accept="image/*">
                <div class="mt-3" th:if="${product.imageUrl != null}">
                    <span class="small text-muted d-block mb-1">Ảnh hiện tại:</span>
                    <img th:src="${product.imageUrl}" class="rounded shadow-sm border border-2 border-white" style="width: 120px; height: 120px; object-fit: cover;">
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu Thay Đổi</button>
        </form>
    </div>
</div>
</body>
</html>

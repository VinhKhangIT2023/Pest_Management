<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Admin - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; }
        .form-switch .form-check-input { width: 3.2em; height: 1.6em; cursor: pointer; border: none; }
        .form-switch .form-check-input:checked { background-color: #2ecc71; }
        .form-switch .form-check-input:not(:checked) { background-color: #e74c3c; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3c/svg%3e"); }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <div class="bg-dark text-white p-3 position-fixed shadow-lg d-flex flex-column" style="width: 250px; height: 100vh; z-index: 1000;">
        <h4 class="fw-bold mb-4 mt-2 text-center text-success"><i class="fa-solid fa-shield-halved"></i> PANEL</h4>
        <p class="text-center text-warning small mb-4 fw-bold border-bottom border-secondary pb-3">👑 ROOT ADMIN</p>
        <div class="list-group list-group-flush border-0 gap-1 flex-grow-1">
            <a href="/admin/dashboard" class="list-group-item list-group-item-action bg-dark text-white border-0 rounded"><i class="fa-solid fa-chart-pie me-2"></i>Thống kê</a>
            <a href="/admin/products" class="list-group-item list-group-item-action bg-dark text-white border-0 rounded"><i class="fa-solid fa-box-open me-2"></i>Sản phẩm</a>
            <a href="/admin/users" class="list-group-item list-group-item-action bg-dark text-white border-0 rounded"><i class="fa-solid fa-users me-2"></i>Người dùng</a>
            <a href="/admin/admins" class="list-group-item list-group-item-action bg-success text-white border-0 rounded fw-bold shadow-sm active"><i class="fa-solid fa-user-shield me-2"></i>Quản lý Admin</a>
        </div>

        <form id="logoutForm" th:action="@{/logout}" method="post" class="mt-auto">
            <button type="button" class="btn btn-danger w-100 fw-bold shadow-sm btn-logout"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng Xuất</button>
        </form>
    </div>

    <div class="flex-grow-1 p-5" style="margin-left: 250px;">
        <h2 class="fw-bold mb-4 text-dark"><i class="fa-solid fa-user-shield text-warning me-2"></i>Quản Lý Quản Trị Viên</h2>

        <div class="card shadow-sm mb-5 p-4 border-0 rounded-4 bg-white border-start border-5 border-warning">
            <h5 class="fw-bold text-warning mb-4"><i class="fa-solid fa-crown me-2"></i>Tạo Tài Khoản Admin Phụ (Sub-Admin)</h5>
            <form th:action="@{/admin/users/create-admin}" method="post" class="row align-items-end">
                <div class="col-md-3"><label class="fw-bold small text-secondary mb-1">Họ và tên:</label><input type="text" class="form-control bg-light border-0 py-2 shadow-none" name="fullName" required></div>
                <div class="col-md-3"><label class="fw-bold small text-secondary mb-1">Username:</label><input type="text" class="form-control bg-light border-0 py-2 shadow-none" name="username" required></div>
                <div class="col-md-3"><label class="fw-bold small text-secondary mb-1">Mật khẩu:</label><input type="password" class="form-control bg-light border-0 py-2 shadow-none" name="password" required></div>
                <div class="col-md-3"><button type="submit" class="btn btn-warning fw-bold py-2 w-100 shadow-sm"><i class="fa-solid fa-check me-2"></i>Cấp Quyền Sub-Admin</button></div>
            </form>
        </div>

        <div th:if="${param.error}" class="alert alert-danger fw-bold rounded-pill shadow-sm"><i class="fa-solid fa-ban me-2"></i>Hệ thống từ chối quyền thao tác!</div>

        <div class="card shadow-sm border-0 rounded-4 overflow-hidden bg-white">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark"><tr><th>Tài khoản</th><th>Họ tên</th><th>Quyền</th><th>Trạng thái</th><th class="text-center">Tắt/Mở</th><th class="text-center">Xóa</th></tr></thead>
                <tbody>
                <tr th:each="u : ${admins}">
                    <td class="fw-bold text-dark"><i class="fa-solid fa-circle-user text-secondary me-2 fs-5"></i>[[${u.username}]]</td>
                    <td th:text="${u.fullName}"></td>
                    <td>
                        <span th:if="${u.role == 'ROLE_ROOT_ADMIN'}" class="badge bg-danger rounded-pill px-3 py-2 fw-bold"><i class="fa-solid fa-crown me-1"></i>ADMIN GỐC</span>
                        <span th:if="${u.role == 'ROLE_ADMIN'}" class="badge bg-warning text-dark rounded-pill px-3 py-2 fw-bold"><i class="fa-solid fa-shield me-1"></i>SUB ADMIN</span>
                    </td>
                    <td>
                        <span th:if="${u.isBlocked}" class="badge bg-danger px-3 py-2 rounded-pill shadow-sm"><i class="fa-solid fa-lock me-1"></i>Bị Khóa</span>
                        <span th:unless="${u.isBlocked}" class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2 rounded-pill"><i class="fa-solid fa-check me-1"></i>Hoạt động</span>
                    </td>

                    <td class="text-center">
                        <form th:if="${u.role != 'ROLE_ROOT_ADMIN'}" th:action="@{/admin/users/toggle-block/{id}(id=${u.id})}" method="post" class="m-0 d-flex justify-content-center">
                            <div class="form-check form-switch m-0">
                                <input class="form-check-input shadow-sm" type="checkbox" role="switch" onchange="this.closest('form').submit();" th:checked="${!u.isBlocked}" title="Khóa/Mở Khóa Sub Admin">
                            </div>
                        </form>
                    </td>

                    <td class="text-center">
                        <form th:if="${u.role != 'ROLE_ROOT_ADMIN'}" th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" class="m-0 form-delete-admin">
                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-circle p-2 shadow-sm" title="Xóa dữ liệu"><i class="fa-solid fa-user-xmark"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. Cảnh báo khi Xóa Sub-Admin
    document.querySelectorAll('.form-delete-admin').forEach(form => {
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Dừng hành động gửi form ngay lập tức

            Swal.fire({
                title: 'Xóa quyền Sub-Admin?',
                text: "Tài khoản quản trị viên này sẽ bị xóa vĩnh viễn khỏi hệ thống!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#85929e',
                confirmButtonText: '<i class="fa-solid fa-trash me-1"></i> Đồng ý xóa',
                cancelButtonText: 'Hủy thao tác'
            }).then((result) => {
                if (result.isConfirmed) {
                    this.submit(); // Tiếp tục gửi form nếu chọn Đồng ý
                }
            });
        });
    });

    // 2. Cảnh báo khi Đăng xuất
    document.querySelectorAll('.btn-logout').forEach(button => {
        button.addEventListener('click', function() {
            Swal.fire({
                title: 'Đăng xuất?',
                text: "Bạn có chắc chắn muốn rời khỏi hệ thống quản trị?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#95a5a6',
                confirmButtonText: 'Đăng xuất ngay',
                cancelButtonText: 'Hủy bỏ'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('logoutForm').submit();
                }
            });
        });
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Chủ - PEST AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f6f9; }
        .product-card { transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm sticky-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fa-solid fa-leaf me-2"></i>PEST AI</a>

        <form th:action="@{/}" method="get" class="d-flex mx-auto w-50 position-relative">
            <div class="input-group shadow-sm rounded-pill overflow-hidden">
                <input id="searchInput" type="text" name="keyword" class="form-control border-0 px-4 shadow-none" placeholder="🔍 Tìm kiếm thuốc đặc trị..." autocomplete="off">
                <button class="btn btn-warning fw-bold px-4 text-dark" type="submit">Tìm</button>
            </div>
            <div id="searchSuggestions" class="position-absolute w-100 bg-white shadow-lg rounded-4 mt-5 d-none overflow-hidden border" style="z-index: 1050; top: 0; max-height: 350px; overflow-y: auto;"></div>
        </form>

        <div class="d-flex align-items-center gap-4">
            <a href="/cart" class="text-white text-decoration-none fw-bold"><i class="fa-solid fa-cart-shopping me-1"></i> Giỏ hàng</a>

            <a href="/user/orders" class="text-white text-decoration-none fw-bold position-relative">
                <i class="fa-solid fa-clock-rotate-left me-1"></i> Lịch sử
                <span id="orderBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" style="font-size: 0.65rem;">
                    0
                </span>
            </a>

            <div class="dropdown" th:if="${currentUser != null}">
                <a class="text-white text-decoration-none d-flex align-items-center dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <img th:if="${currentUser.avatarUrl != null}" th:src="${currentUser.avatarUrl}" class="rounded-circle me-2 border border-2 border-white shadow-sm" style="width: 35px; height: 35px; object-fit: cover;">
                    <img th:unless="${currentUser.avatarUrl != null}" src="https://via.placeholder.com/35?text=U" class="rounded-circle me-2 border border-2 border-white shadow-sm" style="width: 35px; height: 35px; object-fit: cover;">
                    <span class="fw-bold" th:text="${currentUser.fullName}"></span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-3">
                    <li th:if="${#strings.contains(currentUser.role, 'ADMIN')}"><a class="dropdown-item py-2 text-warning fw-bold" href="/admin/dashboard"><i class="fa-solid fa-shield-halved me-2"></i>Quản Trị Admin</a></li>
                    <li><a class="dropdown-item py-2" href="/user/profile"><i class="fa-regular fa-id-card text-success me-2"></i>Thông tin cá nhân</a></li>
                    <li><a class="dropdown-item py-2" href="/user/change-password"><i class="fa-solid fa-key text-warning me-2"></i>Đổi mật khẩu</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form id="logoutForm" th:action="@{/logout}" method="post" class="m-0">
                            <button type="button" class="dropdown-item py-2 text-danger fw-bold btn-logout"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
            <div th:if="${currentUser == null}">
                <a href="/login" class="btn btn-light fw-bold text-success rounded-pill px-4 shadow-sm">Đăng Nhập</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow border-0 rounded-4 p-5 text-center bg-white mb-5 border-top border-4 border-success">
        <h3 class="fw-bold text-success mb-3"><i class="fa-solid fa-robot me-2"></i>AI CHẨN ĐOÁN DỊCH HẠI</h3>
        <p class="text-muted mb-4">Tải ảnh/video lúa bệnh hoặc dùng camera trực tiếp.</p>

        <form th:action="@{/detect}" method="post" enctype="multipart/form-data" class="mx-auto" style="max-width: 500px;">

            <div id="previewContainer" class="mb-4 d-none">
                <img id="imagePreview" src="" class="img-fluid rounded-4 shadow-sm border border-2 border-success" style="max-height: 250px; object-fit: contain;">
                <p class="text-success fw-bold small mt-2"><i class="fa-solid fa-circle-check me-1"></i>Đã nạp ảnh thành công</p>
            </div>

            <div class="d-flex justify-content-center gap-3 mb-4">
                <input type="file" name="file" id="realFileInput" class="d-none" accept="image/*, video/*" required>

                <button type="button" id="btnUpload" class="btn btn-primary fw-bold px-4 py-2 rounded-pill shadow-sm">
                    <i class="fa-solid fa-folder-open me-2"></i> Tải File Lên
                </button>
                <button type="button" id="btnCamera" class="btn btn-outline-secondary fw-bold px-4 py-2 rounded-pill shadow-sm bg-light">
                    <i class="fa-solid fa-camera me-2"></i> Dùng Camera
                </button>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-success w-100 fw-bold py-3 fs-5 rounded-pill shadow" disabled>
                <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Bắt Đầu Nhận Diện
            </button>
        </form>
    </div>

    <h4 class="fw-bold text-dark mb-4 border-bottom pb-2 border-success border-2 d-inline-block"><i class="fa-solid fa-store text-success me-2"></i>Cửa Hàng Đặc Trị</h4>
    <div class="row row-cols-1 row-cols-md-4 g-4 mb-5">
        <div class="col" th:each="p : ${products}">
            <div class="card h-100 shadow-sm border-0 rounded-4 product-card overflow-hidden">
                <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" class="card-img-top" style="height: 200px; object-fit: cover;">
                <img th:unless="${p.imageUrl != null}" src="https://via.placeholder.com/300x200?text=Chưa+có+ảnh" class="card-img-top" style="height: 200px; object-fit: cover;">
                <div class="card-body text-center p-4">
                    <span th:if="${p.isHot}" class="badge bg-danger position-absolute top-0 start-0 m-3 shadow"><i class="fa-solid fa-fire me-1"></i>Bán chạy</span>
                    <h5 class="card-title fw-bold text-dark mb-2" th:text="${p.name}"></h5>
                    <span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill mb-3" th:text="${p.insect != null ? p.insect.displayName : 'Tổng hợp'}"></span>
                    <h4 class="text-danger fw-bold mb-3" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h4>
                    <a th:href="@{/product/{id}(id=${p.id})}" class="btn btn-outline-success w-100 fw-bold rounded-pill shadow-sm">Xem chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="cameraModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div class="modal-header bg-dark text-white rounded-top-4 border-0">
                <h5 class="modal-title fw-bold"><i class="fa-solid fa-camera me-2"></i>Chụp Ảnh Chẩn Đoán</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center p-4 bg-light">
                <video id="videoElement" autoplay playsinline class="w-100 rounded-3 shadow-sm bg-black" style="max-height: 400px;"></video>
                <canvas id="canvasElement" class="d-none"></canvas>
            </div>
            <div class="modal-footer justify-content-center bg-light rounded-bottom-4 border-0">
                <button type="button" class="btn btn-secondary rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Hủy bỏ</button>
                <button type="button" class="btn btn-success rounded-pill px-4 fw-bold shadow" id="btnCaptureFrame">
                    <i class="fa-solid fa-camera-retro me-2"></i>Chụp Ngay
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ----------------------------------------------------
    // XỬ LÝ LẤY SỐ LƯỢNG THÔNG BÁO (TỰ ĐỘNG CHẠY NGẦM MỖI 5 GIÂY)
    // ----------------------------------------------------
    function fetchUnreadOrderCount() {
        const badge = document.getElementById('orderBadge');
        if (!badge) return;

        fetch('/api/orders/unread-count')
            .then(res => res.json())
            .then(count => {
                if (count > 0) {
                    badge.textContent = count;
                    badge.classList.remove('d-none');
                } else {
                    badge.classList.add('d-none');
                }
            })
            .catch(err => console.log("Lỗi tải thông báo: ", err));
    }

    // Chạy lần đầu khi trang load
    fetchUnreadOrderCount();
    // Lặp lại sau mỗi 5 giây
    setInterval(fetchUnreadOrderCount, 5000);

    // ----------------------------------------------------
    // XỬ LÝ TÌM KIẾM ĐỀ XUẤT (AUTO-SUGGEST)
    // ----------------------------------------------------
    document.addEventListener("DOMContentLoaded", function() {
        const input = document.getElementById('searchInput');
        const box = document.getElementById('searchSuggestions');
        let timeout = null;

        input.addEventListener('input', function() {
            clearTimeout(timeout);
            const keyword = this.value.trim();
            if (keyword.length < 1) { box.classList.add('d-none'); return; }

            timeout = setTimeout(() => {
                fetch('/api/search?keyword=' + encodeURIComponent(keyword))
                    .then(res => res.json())
                    .then(data => {
                        if (data.length === 0) { box.classList.add('d-none'); return; }
                        box.innerHTML = '';
                        data.forEach(p => {
                            box.innerHTML += `
                                <a href="/product/${p.id}" class="d-flex align-items-center p-3 text-decoration-none text-dark border-bottom hover-bg-light">
                                    <img src="${p.imageUrl || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;" class="me-3">
                                    <div>
                                        <h6 class="fw-bold mb-0 text-success">${p.name}</h6>
                                        <span class="text-danger fw-bold small">${p.price.toLocaleString('vi-VN')} đ</span>
                                    </div>
                                </a>`;
                        });
                        box.classList.remove('d-none');
                    })
                    .catch(err => console.error("Lỗi Fetch API:", err));
            }, 300);
        });

        document.addEventListener('click', e => {
            if (!input.contains(e.target) && !box.contains(e.target)) box.classList.add('d-none');
        });
    });

    // ----------------------------------------------------
    // XỬ LÝ NÚT TẢI FILE & XEM TRƯỚC ẢNH
    // ----------------------------------------------------
    const realFileInput = document.getElementById('realFileInput');
    const btnUpload = document.getElementById('btnUpload');
    const previewContainer = document.getElementById('previewContainer');
    const imagePreview = document.getElementById('imagePreview');
    const btnSubmit = document.getElementById('btnSubmit');

    btnUpload.addEventListener('click', () => {
        realFileInput.click();
    });

    realFileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                previewContainer.classList.remove('d-none');
                btnSubmit.removeAttribute('disabled');
            }
            reader.readAsDataURL(this.files[0]);
        } else {
            previewContainer.classList.add('d-none');
            btnSubmit.setAttribute('disabled', 'true');
        }
    });

    // ----------------------------------------------------
    // XỬ LÝ WEBCAM / CAMERA TRỰC TIẾP
    // ----------------------------------------------------
    const btnCamera = document.getElementById('btnCamera');
    const videoElement = document.getElementById('videoElement');
    const canvasElement = document.getElementById('canvasElement');
    const btnCaptureFrame = document.getElementById('btnCaptureFrame');
    const cameraModal = new bootstrap.Modal(document.getElementById('cameraModal'));
    let mediaStream = null;

    btnCamera.addEventListener('click', async () => {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            videoElement.srcObject = mediaStream;
            cameraModal.show();
        } catch (err) {
            Swal.fire({
                icon: 'error',
                title: 'Lỗi Truy Cập Camera',
                text: 'Trình duyệt không có quyền sử dụng Camera hoặc máy bạn không có Webcam. Vui lòng kiểm tra lại quyền trong cài đặt trình duyệt!'
            });
        }
    });

    document.getElementById('cameraModal').addEventListener('hidden.bs.modal', () => {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            videoElement.srcObject = null;
        }
    });

    btnCaptureFrame.addEventListener('click', () => {
        const context = canvasElement.getContext('2d');
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        context.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

        const dataUrl = canvasElement.toDataURL('image/jpeg');

        imagePreview.src = dataUrl;
        previewContainer.classList.remove('d-none');
        btnSubmit.removeAttribute('disabled');

        cameraModal.hide();

        fetch(dataUrl)
            .then(res => res.blob())
            .then(blob => {
                const file = new File([blob], "camera_capture.jpg", { type: "image/jpeg" });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                realFileInput.files = dataTransfer.files;
            });
    });

    // ----------------------------------------------------
    // XỬ LÝ ĐĂNG XUẤT (SWEETALERT2)
    // ----------------------------------------------------
    document.querySelectorAll('.btn-logout').forEach(button => {
        button.addEventListener('click', function() {
            Swal.fire({
                title: 'Đăng xuất?',
                text: "Bạn có chắc chắn muốn thoát khỏi hệ thống?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#95a5a6',
                confirmButtonText: 'Đăng xuất ngay',
                cancelButtonText: 'Hủy bỏ'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('logoutForm').submit();
                }
            });
        });
    });
</script>
</body>
</html>

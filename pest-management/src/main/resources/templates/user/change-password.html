<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi Mật Khẩu - PEST AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f6f9; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-leaf me-2"></i>PEST AI</a>
        <a href="/" class="btn btn-light btn-sm fw-bold rounded-pill px-3"><i class="fa-solid fa-house me-1"></i>Về Trang Chủ</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4 p-5 bg-white border-top border-5 border-warning">
                <h4 class="fw-bold text-warning text-center mb-4"><i class="fa-solid fa-key me-2"></i>Đổi Mật Khẩu</h4>

                <form th:action="@{/user/change-password}" method="post">
                    <div class="mb-3">
                        <label class="fw-bold text-secondary small">Mật khẩu cũ:</label>
                        <input type="password" name="oldPassword" class="form-control bg-light border-0 py-2 shadow-none" required>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold text-secondary small">Mật khẩu mới:</label>
                        <input type="password" name="newPassword" class="form-control bg-light border-0 py-2 shadow-none" required minlength="6">
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold text-secondary small">Xác nhận mật khẩu mới:</label>
                        <input type="password" name="confirmPassword" class="form-control bg-light border-0 py-2 shadow-none" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 shadow-sm rounded-pill text-dark"><i class="fa-solid fa-shield-check me-2"></i>Cập Nhật Mật Khẩu</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const errorMsg = /*[[${errorMsg}]]*/ null;
    if (errorMsg) { Swal.fire({ icon: 'error', title: 'Lỗi', text: errorMsg, confirmButtonColor: '#e74c3c' }); }
</script>
</body>
</html>

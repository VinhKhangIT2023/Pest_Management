<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name}">Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #f8fcf8; font-family: 'Segoe UI', sans-serif; } .hover-bg-light:hover { background-color: #f8f9fa; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm sticky-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fa-solid fa-leaf me-2"></i>PEST AI</a>

        <div class="mx-auto w-50 position-relative d-none d-lg-block">
            <form class="d-flex" th:action="@{/}" method="get">
                <div class="input-group shadow-sm rounded-pill overflow-hidden">
                    <input id="searchInput" class="form-control border-0 px-4 shadow-none" type="search" name="keyword" placeholder="🔍 Tìm kiếm thuốc đặc trị..." autocomplete="off">
                    <button class="btn btn-warning px-4 fw-bold shadow-none text-dark" type="submit">Tìm</button>
                </div>
            </form>
            <div id="searchSuggestions" class="position-absolute w-100 bg-white shadow-lg rounded-4 mt-2 d-none overflow-hidden" style="z-index: 1050; max-height: 350px; overflow-y: auto;"></div>
        </div>

        <div class="d-flex align-items-center gap-4 ms-auto" th:if="${currentUser != null}">
            <a href="/cart" class="text-white text-decoration-none fw-bold"><i class="fa-solid fa-cart-shopping me-1"></i> Giỏ hàng</a>
            <a href="/user/orders" class="text-white text-decoration-none fw-bold"><i class="fa-solid fa-clock-rotate-left me-1"></i> Lịch sử</a>

            <div class="dropdown">
                <a class="text-white text-decoration-none d-flex align-items-center dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                    <img th:if="${currentUser.avatarUrl != null}" th:src="${currentUser.avatarUrl}" class="rounded-circle me-2 border border-2 border-white shadow-sm" style="width: 35px; height: 35px; object-fit: cover;">
                    <img th:unless="${currentUser.avatarUrl != null}" src="https://via.placeholder.com/35?text=U" class="rounded-circle me-2 border border-2 border-white shadow-sm" style="width: 35px; height: 35px; object-fit: cover;">
                    <span class="fw-bold" th:text="${currentUser.fullName}"></span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-3">
                    <li th:if="${#strings.contains(currentUser.role, 'ADMIN')}"><a class="dropdown-item py-2 text-warning fw-bold" href="/admin/dashboard"><i class="fa-solid fa-shield-halved me-2"></i>Quản Trị Admin</a></li>
                    <li><a class="dropdown-item py-2" href="/user/profile"><i class="fa-regular fa-id-card text-success me-2"></i>Thông tin cá nhân</a></li>
                    <li><a class="dropdown-item py-2" href="/user/change-password"><i class="fa-solid fa-key text-warning me-2"></i>Đổi mật khẩu</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form id="logoutForm" th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="dropdown-item py-2 text-danger fw-bold"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
        <div th:if="${currentUser == null}" class="ms-auto">
            <a href="/login" class="btn btn-light fw-bold text-success rounded-pill px-4 shadow-sm">Đăng Nhập</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/" class="text-success text-decoration-none fw-bold">Trang chủ</a></li>
            <li class="breadcrumb-item active fw-bold text-dark" th:text="${product.name}"></li>
        </ol>
    </nav>
    <div class="card border-0 rounded-4 shadow-lg overflow-hidden bg-white">
        <div class="row g-0">
            <div class="col-md-5 bg-light d-flex align-items-center justify-content-center p-4">
                <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" class="img-fluid rounded-4 shadow-sm" style="max-height: 400px; object-fit: cover;">
                <img th:unless="${product.imageUrl != null}" src="https://via.placeholder.com/400x400?text=Chưa+có+ảnh" class="img-fluid rounded-4 shadow-sm">
            </div>
            <div class="col-md-7 p-5">
                <h1 class="fw-bold mb-3 text-dark" th:text="${product.name}"></h1>
                <div class="text-danger fw-bold fs-2 mb-4" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                <h5 class="fw-bold">Mô tả sản phẩm:</h5>
                <p class="text-muted mb-4" style="line-height: 1.8;" th:text="${product.description}"></p>

                <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-4 fw-bold mb-4 border border-primary border-opacity-25 shadow-sm" th:if="${product.insect != null}">
                    <i class="fa-solid fa-bug me-2"></i>Đặc trị cho loài: <span class="fs-5 ms-1" th:text="${product.insect.displayName}"></span>
                </div>

                <form th:action="@{/cart/add}" method="post" class="bg-light p-4 rounded-4 shadow-sm border border-success border-opacity-25 mt-4">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <div class="row align-items-center">
                        <div class="col-md-5">
                            <label class="fw-bold text-secondary mb-2 small">Chọn số lượng:</label>
                            <div class="input-group shadow-sm rounded-pill overflow-hidden">
                                <button class="btn btn-white border-0 fs-5 px-3 text-success fw-bold bg-white" type="button" onclick="document.getElementById('qty').value = Math.max(1, parseInt(document.getElementById('qty').value) - 1)">-</button>
                                <input type="number" id="qty" name="quantity" value="1" min="1" class="form-control text-center fw-bold fs-5 border-0 shadow-none bg-white">
                                <button class="btn btn-white border-0 fs-5 px-3 text-success fw-bold bg-white" type="button" onclick="document.getElementById('qty').value = parseInt(document.getElementById('qty').value) + 1">+</button>
                            </div>
                        </div>
                        <div class="col-md-7 text-end mt-4 mt-md-0">
                            <button type="submit" class="btn btn-success btn-lg fw-bold rounded-pill shadow w-100"><i class="fa-solid fa-cart-plus me-2"></i> THÊM VÀO GIỎ NGAY</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const input = document.getElementById('searchInput'), box = document.getElementById('searchSuggestions');
        let timeout = null;
        input.addEventListener('input', function() {
            clearTimeout(timeout);
            const keyword = this.value.trim();
            if (keyword.length < 1) { box.classList.add('d-none'); return; }
            timeout = setTimeout(() => {
                fetch('/api/search?keyword=' + encodeURIComponent(keyword)).then(res => res.json()).then(data => {
                    if (data.length === 0) { box.classList.add('d-none'); return; }
                    box.innerHTML = '';
                    data.forEach(p => {
                        // Đã sửa lại URL thành /product/${p.id} thay vì /products/ để tránh lỗi 404
                        box.innerHTML += `<a href="/product/${p.id}" class="d-flex align-items-center p-3 text-decoration-none text-dark border-bottom hover-bg-light"><img src="${p.imageUrl || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;" class="me-3"><div><h6 class="fw-bold mb-0 text-success">${p.name}</h6><span class="text-danger fw-bold small">${p.price.toLocaleString('vi-VN')} đ</span></div></a>`;
                    });
                    box.classList.remove('d-none');
                });
            }, 300);
        });
        document.addEventListener('click', e => { if (!input.contains(e.target) && !box.contains(e.target)) box.classList.add('d-none'); });
    });
</script>
</body>
</html>

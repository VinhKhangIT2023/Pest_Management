<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông Tin Cá Nhân - PEST AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f6f9; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-leaf me-2"></i>PEST AI</a>
        <a href="/" class="btn btn-light btn-sm fw-bold rounded-pill px-3"><i class="fa-solid fa-house me-1"></i>Về Trang Chủ</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4 p-5 bg-white">
                <h3 class="fw-bold text-success text-center mb-4"><i class="fa-solid fa-id-card me-2"></i>Hồ Sơ Cá Nhân</h3>

                <form th:action="@{/user/profile/update}" method="post" enctype="multipart/form-data">
                    <div class="text-center mb-4">
                        <img th:if="${currentUser.avatarUrl != null}" th:src="${currentUser.avatarUrl}" class="rounded-circle shadow border border-3 border-success mb-3" style="width: 120px; height: 120px; object-fit: cover;">
                        <img th:unless="${currentUser.avatarUrl != null}" src="https://via.placeholder.com/120?text=Avatar" class="rounded-circle shadow border border-3 border-secondary mb-3" style="width: 120px; height: 120px; object-fit: cover;">
                        <div>
                            <label class="btn btn-outline-success btn-sm rounded-pill px-3 fw-bold cursor-pointer">
                                <i class="fa-solid fa-camera me-1"></i> Đổi ảnh đại diện
                                <input type="file" name="avatarFile" class="d-none" accept="image/*">
                            </label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold text-secondary small">Họ và Tên:</label>
                        <input type="text" name="fullName" th:value="${currentUser.fullName}" class="form-control bg-light border-0 py-2 shadow-none" required>
                    </div>

                    <div class="mb-4">
                        <label class="fw-bold text-secondary small">Địa chỉ nhận hàng mặc định:</label>
                        <textarea name="defaultAddress" class="form-control bg-light border-0 py-2 shadow-none" rows="2" placeholder="Ví dụ: 140 Lê Trọng Tấn, Tây Thạnh, Tân Phú, TP.HCM">[[${currentUser.defaultAddress}]]</textarea>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm rounded-pill"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu Thay Đổi</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const successMsg = /*[[${successMsg}]]*/ null;
    const errorMsg = /*[[${errorMsg}]]*/ null;

    if (successMsg) { Swal.fire({ icon: 'success', title: 'Thành công!', text: successMsg, confirmButtonColor: '#2ecc71' }); }
    if (errorMsg) { Swal.fire({ icon: 'error', title: 'Thất bại!', text: errorMsg, confirmButtonColor: '#e74c3c' }); }
</script>
</body>
</html>

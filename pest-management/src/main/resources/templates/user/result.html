<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết Quả AI Chẩn Đoán - Pest AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { background-color: #f8fcf8; font-family: 'Segoe UI', sans-serif;} .danger-header { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border-radius: 20px 20px 0 0; padding: 20px; } .success-header { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border-radius: 20px 20px 0 0; padding: 20px; } .hover-bg-light:hover { background-color: #f8f9fa; }</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm sticky-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fa-solid fa-leaf me-2"></i>PEST AI</a>

        <div class="mx-auto w-50 position-relative d-none d-lg-block">
            <form class="d-flex" th:action="@{/}" method="get">
                <div class="input-group shadow-sm rounded-pill overflow-hidden">
                    <input id="searchInput" class="form-control border-0 px-4 shadow-none" type="search" name="keyword" placeholder="🔍 Tìm kiếm thuốc đặc trị..." autocomplete="off">
                    <button class="btn btn-warning px-4 fw-bold shadow-none text-dark" type="submit">Tìm</button>
                </div>
            </form>
            <div id="searchSuggestions" class="position-absolute w-100 bg-white shadow-lg rounded-4 mt-2 d-none overflow-hidden" style="z-index: 1050; max-height: 350px; overflow-y: auto;"></div>
        </div>

        <div class="d-flex align-items-center gap-4 ms-auto">
            <a href="/cart" class="text-white text-decoration-none fw-bold"><i class="fa-solid fa-cart-shopping me-1"></i> Giỏ hàng</a>
            <a href="/user/orders" class="text-white text-decoration-none fw-bold"><i class="fa-solid fa-clock-rotate-left me-1"></i> Lịch sử</a>

            <div class="dropdown" th:if="${currentUser != null}">
                <a class="text-white text-decoration-none d-flex align-items-center dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                    <img th:if="${currentUser.avatarUrl != null}" th:src="${currentUser.avatarUrl}" class="rounded-circle me-2 border border-2 border-white shadow-sm" style="width: 35px; height: 35px; object-fit: cover;">
                    <img th:unless="${currentUser.avatarUrl != null}" src="https://via.placeholder.com/35?text=U" class="rounded-circle me-2 border border-2 border-white shadow-sm" style="width: 35px; height: 35px; object-fit: cover;">
                    <span class="fw-bold" th:text="${currentUser.fullName}"></span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 rounded-3">
                    <li th:if="${#strings.contains(currentUser.role, 'ADMIN')}"><a class="dropdown-item py-2 text-warning fw-bold" href="/admin/dashboard"><i class="fa-solid fa-shield-halved me-2"></i>Quản Trị Admin</a></li>
                    <li><a class="dropdown-item py-2" href="/user/profile"><i class="fa-regular fa-id-card text-success me-2"></i>Thông tin cá nhân</a></li>
                    <li><a class="dropdown-item py-2" href="/user/change-password"><i class="fa-solid fa-key text-warning me-2"></i>Đổi mật khẩu</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form id="logoutForm" th:action="@{/logout}" method="post" class="m-0">
                            <button type="button" class="dropdown-item py-2 text-danger fw-bold btn-logout"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
            <div th:if="${currentUser == null}">
                <a href="/login" class="btn btn-light fw-bold text-success rounded-pill px-4 shadow-sm">Đăng Nhập</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="text-center mb-5">
        <a href="/" class="btn btn-outline-secondary rounded-pill fw-bold px-4 mb-3 shadow-sm"><i class="fa-solid fa-arrow-left me-2"></i>Quét Hình Ảnh Khác</a>
        <h1 class="fw-bold text-success"><i class="fa-solid fa-microscope me-2"></i>BÁO CÁO CHẨN ĐOÁN</h1>
    </div>

    <div th:if="${error}" class="alert alert-danger rounded-4 shadow-sm p-4 text-center fw-bold fs-5"><i class="fa-solid fa-triangle-exclamation fa-2x mb-2"></i><br><span th:text="${error}"></span></div>

    <div th:if="${insect}" class="row g-4">
        <div class="col-lg-5">
            <div class="card border-0 rounded-4 shadow-lg h-100">
                <!-- CẬP NHẬT HEADER CHỨA ẢNH Ở ĐÂY -->
                <div class="danger-header d-flex align-items-center justify-content-center gap-4">
                    <img th:if="${uploadedImage != null}" th:src="${uploadedImage}" class="rounded-circle shadow-lg" style="width: 100px; height: 100px; object-fit: cover; border: 3px solid white;">
                    <i th:unless="${uploadedImage != null}" class="fa-solid fa-spider fa-3x"></i>
                    <div class="text-start">
                        <h3 class="fw-bold mb-1" th:text="${insect.displayName}">Tên Bệnh</h3>
                        <span class="badge bg-light text-danger mt-1 fw-bold px-3 py-1 rounded-pill shadow-sm">Mức độ nguy hại cao</span>
                    </div>
                </div>

                <div class="card-body p-4 bg-white rounded-bottom-4">
                    <h6 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-circle-info me-2"></i>Đặc điểm nhận dạng</h6>
                    <p class="text-dark bg-light p-3 rounded-3" style="line-height: 1.8;" th:text="${insect.description}"></p>
                    <h6 class="fw-bold text-secondary mb-3 mt-4"><i class="fa-solid fa-shield-virus me-2"></i>Biện pháp canh tác</h6>
                    <p class="text-dark bg-light p-3 rounded-3 border-start border-4 border-success" style="line-height: 1.8;" th:text="${insect.prevention}"></p>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card border-0 rounded-4 shadow-lg h-100 bg-light">
                <div class="success-header d-flex align-items-center">
                    <i class="fa-solid fa-prescription-bottle-medical fa-2x me-3"></i>
                    <h4 class="fw-bold mb-0">Phác Đồ & Thuốc Đặc Trị Khuyên Dùng</h4>
                </div>
                <div class="card-body p-4 rounded-bottom-4">
                    <div class="row g-3">
                        <div class="col-md-6" th:each="p : ${products}">
                            <div class="card h-100 bg-white border-0 shadow-sm p-3 hover-card" style="transition: 0.3s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                                <h6 class="fw-bold text-success mb-1" th:text="${p.name}"></h6>
                                <h5 class="text-danger fw-bold mb-2" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h5>
                                <p class="text-muted small flex-grow-1" th:text="${p.description}"></p>
                                <form th:action="@{/cart/add}" method="post">
                                    <input type="hidden" name="productId" th:value="${p.id}">
                                    <input type="hidden" name="quantity" value="1">
                                    <button type="submit" class="btn btn-outline-success w-100 rounded-pill fw-bold btn-sm"><i class="fa-solid fa-plus me-1"></i>Thêm Vào Giỏ</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Logout SweetAlert
    document.querySelectorAll('.btn-logout').forEach(button => {
        button.addEventListener('click', function() {
            Swal.fire({ title: 'Đăng xuất?', text: "Bạn có chắc chắn muốn thoát khỏi hệ thống?", icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', cancelButtonColor: '#95a5a6', confirmButtonText: 'Đăng xuất ngay', cancelButtonText: 'Hủy bỏ' })
            .then((result) => { if (result.isConfirmed) { document.getElementById('logoutForm').submit(); } });
        });
    });

    // Auto-Suggest
    document.addEventListener("DOMContentLoaded", function() {
        const input = document.getElementById('searchInput'), box = document.getElementById('searchSuggestions');
        let timeout = null;
        input.addEventListener('input', function() {
            clearTimeout(timeout);
            const keyword = this.value.trim();
            if (keyword.length < 1) { box.classList.add('d-none'); return; }
            timeout = setTimeout(() => {
                fetch('/api/search?keyword=' + encodeURIComponent(keyword)).then(res => res.json()).then(data => {
                    if (data.length === 0) { box.classList.add('d-none'); return; }
                    box.innerHTML = '';
                    data.forEach(p => {
                        box.innerHTML += `<a href="/product/${p.id}" class="d-flex align-items-center p-3 text-decoration-none text-dark border-bottom hover-bg-light"><img src="${p.imageUrl || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;" class="me-3"><div><h6 class="fw-bold mb-0 text-success">${p.name}</h6><span class="text-danger fw-bold small">${p.price.toLocaleString('vi-VN')} đ</span></div></a>`;
                    });
                    box.classList.remove('d-none');
                });
            }, 300);
        });
        document.addEventListener('click', e => { if (!input.contains(e.target) && !box.contains(e.target)) box.classList.add('d-none'); });
    });
</script>
</body>
</html>
